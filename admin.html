<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <title>Admin Panel</title>
</head>
<body>
  <header>
    <div class="head_box">
      <div class="title_box">
        <h1>Admin Panel</h1>
        <h3>Developer profile management</h3>
      </div>

      <button type="button" onclick="location.href='index.html'" class="back-btn">Back</button>
    </div>
  </header>

  <main>
    <section class="admin-container admin-shell">
      <div class="admin-login" id="adminLogin">
        <h2>Admin sign in</h2>
        <p>Sign in with the authorized Google account to manage profiles.</p>
        <button type="button" id="adminLoginBtn">Google Login</button>
      </div>

      <div class="admin-card admin-workspace" id="adminPanel" hidden>
        <aside class="admin-sidebar">
          <div class="admin-sidebar-head">
            <h2>Profiles</h2>
            <button type="button" id="addProfileBtn">New</button>
          </div>

          <input type="search" id="adminSearchInput" placeholder="Search profiles">
          <div class="admin-profile-list" id="adminProfileList"></div>

          <button type="button" id="logoutBtn" class="admin-secondary-button">Logout</button>
        </aside>

        <form class="admin-editor" id="profileForm">
          <div class="admin-editor-head">
            <div>
              <h2 id="editorTitle">Select a profile</h2>
              <p id="editorStatus">Choose a profile from the list or create a new one.</p>
            </div>
            <div class="admin-editor-actions">
              <button type="submit" id="saveProfileBtn">Save</button>
              <button type="button" id="deleteProfileBtn" class="danger-button">Delete</button>
            </div>
          </div>

          <div class="admin-form-grid">
            <label>
              ID
              <input id="editId" required placeholder="minty">
            </label>
            <label>
              Name
              <input id="editName" required placeholder="Display name">
            </label>
            <label>
              Affiliation
              <input id="editAffiliation" placeholder="School or team">
            </label>
            <label>
              Started Year
              <input id="editStartedYear" type="number" placeholder="2023">
            </label>
          </div>

          <div class="admin-form-section">
            <h3>Activity Name</h3>
            <div class="admin-form-grid three">
              <label>KO<input id="editActivityKo"></label>
              <label>EN<input id="editActivityEn"></label>
              <label>JA<input id="editActivityJa"></label>
            </div>
          </div>

          <div class="admin-form-section">
            <h3>Role</h3>
            <div class="admin-form-grid three">
              <label>KO<input id="editRoleKo"></label>
              <label>EN<input id="editRoleEn"></label>
              <label>JA<input id="editRoleJa"></label>
            </div>
          </div>

          <div class="admin-form-section">
            <h3>Tagline</h3>
            <div class="admin-form-grid three">
              <label>KO<input id="editTaglineKo"></label>
              <label>EN<input id="editTaglineEn"></label>
              <label>JA<input id="editTaglineJa"></label>
            </div>
          </div>

          <div class="admin-form-grid">
            <label>
              Stack
              <input id="editStack" placeholder="HTML, CSS, JavaScript">
            </label>
            <label>
              Interests
              <input id="editInterests" placeholder="Web, Game">
            </label>
            <label>
              GitHub URL
              <input id="editGithub" type="url">
            </label>
            <label>
              Blog URL
              <input id="editBlog" type="url">
            </label>
            <label>
              Email
              <input id="editEmail" type="email">
            </label>
          </div>

          <div class="admin-form-section">
            <h3>Profile Image</h3>
            <div class="admin-image-row">
              <img id="editPreviewImage" alt="">
              <input type="file" id="editImageFile" accept="image/*">
            </div>
          </div>

          <div class="admin-form-section">
            <h3>Projects JSON</h3>
            <textarea id="editProjects" spellcheck="false" placeholder='[{"name":"Project","description":{"ko":"","en":"","ja":""},"link":"https://..."}]'></textarea>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
