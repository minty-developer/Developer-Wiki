<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <title>Developer Wiki</title>
</head>
<body>
  <header>
    <div class="head_box">
      <div class="title_box">
        <h1>Developer Wiki</h1>
        <h3>Developer profile space</h3>
      </div>

      <div class="header-right">
        <div class="rang_select_box" aria-label="Language">
          <button type="button" data-lang="ko">Korean</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="ja">Japanese</button>
        </div>

        <a href="mypage.html">
          <button type="button" class="discord-btn">관리자에게 문의하기</button>
        </a>
        <button type="button" id="loginBtn">Google Login</button>
        <button type="button" class="admin-btn" hidden>Admin</button>
      </div>
    </div>
  </header>

  <main>
    <section class="Control_Section">
      <input type="search" id="searchInput" placeholder="Search profiles...">
    </section>

    <section class="Card_Section">
      <div class="card-container"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
